<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Subtle dot grid (decorative, matching portfolio) -->
  <g opacity="0.15" fill="#7c3aed">
    <circle cx="10" cy="10" r="1"/>
    <circle cx="18" cy="10" r="1"/>
    <circle cx="10" cy="18" r="1"/>
    <circle cx="18" cy="18" r="1"/>
    <circle cx="10" cy="26" r="1"/>
    <circle cx="18" cy="26" r="1"/>
  </g>

  <!-- Terminal prompt ">" symbol -->
  <text
    x="7"
    y="43"
    font-family="'Courier New', monospace"
    font-size="16"
    font-weight="bold"
    fill="url(#accent)"
    filter="url(#glow)"
  >&gt;</text>

  <!-- "MM" monogram in monospace style -->
  <text
    x="22"
    y="43"
    font-family="'Courier New', monospace"
    font-size="24"
    font-weight="bold"
    fill="#ffffff"
    letter-spacing="-2"
  >MM</text>

  <!-- Blinking cursor bar -->
  <rect x="55" y="22" width="4" height="18" rx="1" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>

  <!-- Bottom accent line -->
  <rect x="7" y="50" width="50" height="1.5" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>
